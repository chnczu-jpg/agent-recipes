name: ci

on:
  push:
  pull_request:

jobs:
  test-package-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Unit tests
        run: PYTHONDONTWRITEBYTECODE=1 python -m unittest discover -s tests
      - name: Build wheel
        run: python -m pip wheel --no-deps . --wheel-dir dist/wheels
      - name: Isolated wheel smoke
        run: ./bin/verify-clean-install dist/wheels/*.whl

